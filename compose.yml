services:
  postgres:
    image: postgres:16-alpine
    container_name: ontrack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ontrack
    ports:
      - "5434:5432"
    volumes:
      - ontrack_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ontrack"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ontrack_postgres_data:
  ontrack_pgadmin_data:
